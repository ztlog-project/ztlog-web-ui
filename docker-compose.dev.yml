services:
  ztlog-web-ui-dev:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/ztlog-web-ui:dev
    container_name: ztlog-web-ui-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=${BACKEND_URL:-http://host.docker.internal:8087}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
